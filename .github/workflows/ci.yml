name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libtiff-dev libzstd-dev liblzma-dev libjpeg-dev libwebp-dev libdeflate-dev libgeotiff-dev

    - name: Build
      run: cargo build --verbose

    - name: Test UPX compression (optional)
      run: |
        if command -v upx &> /dev/null; then
          echo "UPX available, testing compression..."
          cp ./target/debug/tiff-reducer ./tiff-reducer-upx-test
          upx --best --lzma ./tiff-reducer-upx-test
          echo "UPX compression successful"
          rm ./tiff-reducer-upx-test
        else
          echo "UPX not available, skipping compression test"
        fi

    - name: Run error handling tests
      run: cargo test --test integration_tests handling --verbose

    - name: Check format
      run: cargo fmt -- --check

    - name: Clippy
      run: cargo clippy -- -D warnings

  html-report:
    name: HTML Visual Report
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository_owner == 'kassoulet'

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libtiff-dev libzstd-dev liblzma-dev libjpeg-dev libwebp-dev libdeflate-dev libgeotiff-dev \
          python3 python3-pip python3-gdal gdal-bin libgdal-dev

    - name: Install Python dependencies
      run: |
        pip3 install --break-system-packages numpy pillow

    - name: Build release binary
      run: cargo build --release

    - name: Generate Markdown Test Report
      run: |
        ./tests/generate-report.sh \
          --format zstd \
          --level 19 \
          --number 20

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: tests/report/
        retention-days: 7
