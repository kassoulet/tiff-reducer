name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary via Docker
        run: docker build -t tiffthin-static .

      - name: Extract binary
        run: |
          docker create --name temp-tiffthin tiffthin-static
          docker cp temp-tiffthin:/usr/local/bin/tiff-reducer ./tiff-reducer
          docker rm temp-tiffthin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiff-reducer-static
          path: ./tiff-reducer

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: ./tiff-reducer

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tiff-reducer
          asset_name: tiff-reducer-linux-x64
          asset_content_type: application/octet-stream
