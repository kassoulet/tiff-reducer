name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup component add clippy rustfmt

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git cmake make g++ gdal-bin

    - name: Build
      run: cargo build --release

    - name: Run full integration tests
      run: cargo test --test integration_tests -- --test-threads=1

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Clippy
      run: cargo clippy -- -D warnings

    - name: Generate test report
      run: |
        cargo run --bin test-report --release --quiet -- \
          --format zstd \
          --level 19 \
          --limit 20 \
          --output tests/README.md

    - name: Upload test report
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: tests/README.md
        retention-days: 7

  html-report:
    name: Visual Test Report
    runs-on: ubuntu-latest
    if: false  # Disabled until we add visual report support
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git cmake make g++ gdal-bin

    - name: Build release binary
      run: cargo build --release

    - name: Generate sample test report
      run: |
        cargo run --bin test-report --release --quiet -- \
          --format zstd \
          --level 19 \
          --limit 20 \
          --output tests/README-sample.md

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: test-report-sample
        path: tests/README-sample.md
        retention-days: 7
