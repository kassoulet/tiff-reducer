name: Visual Tests

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  html-report:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libtiff-dev libzstd-dev liblzma-dev libjpeg-dev libwebp-dev libdeflate-dev \
          python3 python3-pip python3-gdal gdal-bin libgdal-dev

    - name: Install Python dependencies
      run: |
        pip3 install --break-system-packages numpy pillow

    - name: Build release binary
      run: cargo build --release

    - name: Generate HTML Visual Test Report
      run: |
        python3 tests/generate_html_report.py \
          --input tests/images \
          --output tests/report \
          --binary ./target/release/tiff-reducer \
          --format zstd \
          --level 19 \
          --limit 20

    - name: Upload HTML Report
      if: github.event_name == 'push' && github.repository_owner == 'kassoulet'
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: tests/report/
        retention-days: 7

    - name: Upload test thumbnails
      if: github.event_name == 'push' && github.repository_owner == 'kassoulet'
      uses: actions/upload-artifact@v4
      with:
        name: test-thumbnails
        path: tests/report/thumbnails/
        retention-days: 7
